<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none" aria-hidden="true" focusable="false">
  <!-- 小さな庭の俯瞰: 区画を細線で割り、植え込み・飛び石。○6つ(3対3=6人)の控えめな暗喩。顔は描かない。 -->
  <rect x="18.5" y="22.5" width="283" height="155" rx="8" stroke="currentColor" stroke-width="1.4"/>
  <!-- 区画線 -->
  <line x1="160" y1="22.5" x2="160" y2="177.5" stroke="currentColor" stroke-width="1" opacity="0.55"/>
  <line x1="18.5" y1="100" x2="301.5" y2="100" stroke="currentColor" stroke-width="1" opacity="0.55"/>
  <!-- 飛び石(奥へ続く) -->
  <ellipse cx="92" cy="148" rx="13" ry="6.5" stroke="currentColor" stroke-width="1.2" opacity="0.8"/>
  <ellipse cx="128" cy="132" rx="10.5" ry="5.5" stroke="currentColor" stroke-width="1.2" opacity="0.8"/>
  <ellipse cx="160" cy="118" rx="8.5" ry="4.5" stroke="currentColor" stroke-width="1.2" opacity="0.8"/>
  <!-- 植え込み(線画) -->
  <path d="M232 78V52M222 62l10-9 10 9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M262 78V58M254 65l8-7 8 7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 人の比喩: 上段3つ / 下段3つ の小さな○(石/植栽の抽象)。accent は1点のみ。 -->
  <circle cx="62" cy="56" r="6" stroke="currentColor" stroke-width="1.3"/>
  <circle cx="92" cy="56" r="6" stroke="currentColor" stroke-width="1.3"/>
  <circle cx="122" cy="56" r="6" fill="none" stroke="var(--brand-accent, currentColor)" stroke-width="1.6"/>
  <circle cx="206" cy="148" r="6" stroke="currentColor" stroke-width="1.3"/>
  <circle cx="236" cy="148" r="6" stroke="currentColor" stroke-width="1.3"/>
  <circle cx="266" cy="148" r="6" stroke="currentColor" stroke-width="1.3"/>
</svg>
